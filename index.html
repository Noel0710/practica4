<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica Full Stack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f4;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #35424a;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            text-align: center;
            flex: 1;
        }

        .links {
            margin-top: 30px;
        }

        .links a {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            background-color: #e8491d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .links a:hover {
            background-color: #35424a;
        }

        footer {
            background: #35424a;
            color: black;
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .links a {
                display: block;
                margin: 10px auto;
                width: 80%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Práctica 4 - Desarrollo Full Stack</h1>
        <h2>Maquetación Web Nativa vs Framework</h2>
    </header>

    <div class="container">
        <div class="links">
            <a href="indexDos.html">Ver versión Nativa (HTML5 + CSS)</a>
            <a href="indesBoststrap.html">Ver versión con Bootstrap</a>
        </div>
    </div>

    <footer>
        echo por Noel Sánchez Cabrera
    </footer>
</body>
</html>
